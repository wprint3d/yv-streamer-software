name: yv-streamer-software Image CI

on:
  push:
    branches: [ "main", "master", "pre-alpha", "alpha", "beta" ]
    tags: [ "v*", "yv-streamer-software-v*" ]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/yv-streamer-software-image.yml"
  pull_request:
    branches: [ "main", "master", "pre-alpha", "alpha", "beta" ]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/yv-streamer-software-image.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-yv-streamer-software-image:
    name: Build yv-streamer-software image
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || 'wprint3d' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          VERSION_TAG=""
          DOCKERHUB_USERNAME="${{ vars.DOCKERHUB_USERNAME || 'wprint3d' }}"
          IMAGE_NAME="${{ vars.DOCKER_IMAGE_NAME || 'yv-streamer-software' }}"
          TAG_ARGS="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
            VERSION_TAG="${VERSION_TAG#yv-streamer-software-v}"
            VERSION_TAG="${VERSION_TAG#v}"
            TAG_ARGS="${TAG_ARGS},${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${VERSION_TAG}"
          fi

          echo "tags=${TAG_ARGS}" >> "$GITHUB_OUTPUT"

      - name: Build yv-streamer-software image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=yv-streamer-software
          cache-to: type=gha,mode=max,scope=yv-streamer-software
